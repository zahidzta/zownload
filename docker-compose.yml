services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zownload-backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=4000
      - NODE_ENV=development
    networks:
      - downloader-net
  
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zownload-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - api
    networks:
      - downloader-net

networks:
  downloader-net:
    driver: bridge